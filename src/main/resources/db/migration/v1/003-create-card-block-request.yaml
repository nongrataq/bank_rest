databaseChangeLog:
  - changeSet:
      id: 005-create-card-block-requests-table
      author: nongrataqqq
      changes:
        - createTable:
            tableName: card_block_requests
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
              - column:
                  name: card_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: user_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: reason
                  type: TEXT
              - column:
                  name: status
                  type: VARCHAR(20)
                  defaultValue: 'PENDING'
              - column:
                  name: processed_at
                  type: TIMESTAMP
              - column:
                  name: processed_by
                  type: UUID
              - column:
                  name: created_at
                  type: TIMESTAMP
              - column:
                  name: updated_at
                  type: TIMESTAMP

        - addForeignKeyConstraint:
            baseTableName: card_block_requests
            baseColumnNames: card_id
            referencedTableName: cards
            referencedColumnNames: id
            constraintName: fk_card_block_request_card

        - addForeignKeyConstraint:
            baseTableName: card_block_requests
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_card_block_request_user

        - addForeignKeyConstraint:
            baseTableName: card_block_requests
            baseColumnNames: processed_by
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_card_block_request_processed_by