databaseChangeLog:
  - changeSet:
      id: 001-create-roles-table
      author: nongrataqqq
      changes:
        - createTable:
            tableName: roles
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: role_name
                  type: VARCHAR(20)
                  defaultValue: 'USER'
                  constraints:
                    unique: true
              - column:
                  name: created_at
                  type: TIMESTAMP
              - column:
                  name: updated_at
                  type: TIMESTAMP

  - changeSet:
      id: 002-create-users-table
      author: nongrataqqq
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: email
                  type: VARCHAR(255)
                  constraints:
                    unique: true
                    nullable: false
              - column:
                  name: hash_password
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: username
                  type: VARCHAR(255)
              - column:
                  name: locked
                  type: BOOLEAN
                  defaultValueBoolean: false
              - column:
                  name: created_at
                  type: TIMESTAMP
              - column:
                  name: updated_at
                  type: TIMESTAMP

  - changeSet:
      id: 003-create-cards-table
      author: nongrataqqq
      changes:
        - createTable:
            tableName: cards
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: encrypted_pan
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: user_id
                  type: UUID
                  constraints:
                    foreignKeyName: fk_card_user
                    references: users(id)
                    nullable: false
              - column:
                  name: expiry_date
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(20)
                  defaultValue: 'ACTIVE'
                  constraints:
                    nullable: false
              - column:
                  name: balance
                  type: DECIMAL(19, 2)
                  defaultValueNumeric: 0.0
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
              - column:
                  name: updated_at
                  type: TIMESTAMP

  - changeSet:
      id: 004-create-mtm-users-roles-table
      author: nongrataqqq
      changes:
        - createTable:
            tableName: users_roles
            columns:
              - column:
                  name: user_id
                  type: UUID
                  constraints:
                    foreignKeyName: fk_users_roles_user
                    references: users(id)
                    nullable: false
              - column:
                  name: role_id
                  type: UUID
                  constraints:
                    foreignKeyName: fk_users_roles_role
                    references: roles(id)
                    nullable: false

  - changeSet:
      id: 005-add-primary-key-to-users-roles-table
      author: nongrataqqq
      changes:
        - addPrimaryKey:
            tableName: users_roles
            columnNames: user_id, role_id
            constraintName: pk_users_roles

  - changeSet:
      id: 006-init-roles
      author: nongrataqqq
      changes:
        - insert:
            tableName: roles
            columns:
              - column:
                  name: id
                  valueComputed: gen_random_uuid()
              - column:
                  name: role_name
                  value: 'USER'
              - column:
                  name: created_at
                  valueComputed: NOW()
              - column:
                  name: updated_at
                  valueComputed: NOW()
        - insert:
            tableName: roles
            columns:
              - column:
                  name: id
                  valueComputed: gen_random_uuid()
              - column:
                  name: role_name
                  value: 'ADMIN'
              - column:
                  name: created_at
                  valueComputed: NOW()
              - column:
                  name: updated_at
                  valueComputed: NOW()